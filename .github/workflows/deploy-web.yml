name: Deploy depopulatefairplan.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Pipeline: regenerate data/exports/ from committed sources/ ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install pipeline dependencies
        run: uv sync

      - name: Run pipeline (normalize + exports)
        run: |
          mkdir -p data/processed/fair data/processed/cdi data/processed/analysis data/exports
          PYTHONPATH=src uv run python -m fairplan.cli normalize --processed-dir data/processed
          PYTHONPATH=src uv run python -m fairplan.cli exports --processed-dir data/processed --exports-dir data/exports

      # --- Website: sync data, install, build ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Sync pipeline exports into web/public/data/
        working-directory: web
        run: ./scripts/sync-data.sh

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web/
        working-directory: web
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
